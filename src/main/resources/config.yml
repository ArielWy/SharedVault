# ==========================================
# SharedVault - Main Configuration
# ==========================================

# -------------------------
# Redis (real-time sync)
# -------------------------
redis:
  host: "127.0.0.1"
  port: 6379
  password: ""        # leave empty if no password

# -------------------------
# MySQL (persistent storage)
# -------------------------
database:
  host: "127.0.0.1"
  port: 3306
  name: "sharedvault"
  user: "root"
  password: ""
  pool-size: 10
  save-delay-ms: 2000

# -------------------------
# Vault Settings
# -------------------------
vault:
  default-name: "global"
  allowed-sizes: [9, 18, 27, 36, 45, 54]
